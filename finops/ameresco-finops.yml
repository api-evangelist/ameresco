meters:
  - name: contracted_engagement
    description: >-
      Placeholder meter for engagements settled outside a metered API. Real
      meters cannot be enumerated until Ameresco publishes a metered
      API billing surface.
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: >-
      Without a public usage API, consumers must rely on contract reporting,
      invoice line items, and any tenant dashboards provided under the
      partner agreement.
  - name: Allocation
    description: >-
      Allocate spend by purchase order, contract identifier, or business unit
      receiving the Ameresco service. Tag at the procurement layer, not
      the API call layer.
  - name: Optimization
    description: >-
      Optimization levers live in commercial negotiation (volume commitments,
      term length, scope) rather than in API-level caching or throttling.
  - name: Accountability
    description: >-
      Procurement and the business owner of the Ameresco relationship own
      the spend; finance reviews invoice lines on the contract cadence.
maintainers:
