specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Ameresco
providerId: ameresco
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Energy Efficiency
  - Clean Energy
  - Services
  - Rate Limiting
description: >-
  Ameresco does not publish public API rate limits. Reconcile when public rate limit documentation becomes available.
notes: >-
  Ameresco is an energy services company (ESCO) delivering performance contracts, distributed generation, and asset management to public-sector and large commercial customers. It does not publish a public API developer portal with documented pricing or rate limits. Reconcile if Ameresco publishes a public API.
sources:
  - https://www.ameresco.com
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Undocumented - bilateral agreement
    scope: contract
    metric: varies
    limit: 'see partner agreement; not publicly documented'
policies:
  - name: Documentation Status
    description: >-
      Ameresco does not publish public per-second or per-minute API rate
      limits. Throughput, concurrency, and burst behavior are governed by the
      relevant partner, supplier, or merchant agreement.
  - name: Backoff Strategy
    description: >-
      Where any HTTP API is exposed, clients should implement exponential
      backoff with jitter and honor any Retry-After header returned on 429
      or 503 responses.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
